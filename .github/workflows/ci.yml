name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Qt system libraries
        # PyQt6 needs a handful of native libs even when running headless via
        # the offscreen platform plugin.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libfontconfig1 \
            libxcb-cursor0

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke-test package import
        run: python -c "import my_dropper_app; print(my_dropper_app.__version__)"

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -v
